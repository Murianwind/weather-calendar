<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기상청 날씨 달력 구독 서비스</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Pretendard', sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-google { background-color: #4285F4; color: white; }
        .btn-apple { background-color: #000000; color: white; }
        #preview { background: white; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .weather-item { border-bottom: 1px solid #eee; padding: 8px 0; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold">☀️ 기상청 날씨 달력</h1>
        <p class="lead text-muted">매일 아침 캘린더에서 날씨를 확인하세요.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4 mb-4">
                <h4 class="mb-3">📍 1. 지역 설정하기</h4>
                <div class="alert alert-info">
                    현재 <strong>봉화산로 193</strong> 기준으로 설정되어 있습니다. <br>
                    <small>(지역 변경 기능은 추후 업데이트 예정입니다.)</small>
                </div>
            </div>

            <div class="card p-4 mb-4 text-center">
                <h4 class="mb-3">🔗 2. 달력 구독하기</h4>
                <div class="input-group mb-3">
                    <input type="text" id="urlInput" class="form-control" value="https://raw.githubusercontent.com/Murianwind/weather-calendar/refs/heads/main/weather.ics" readonly>
                    <button class="btn btn-outline-secondary" onclick="copyUrl()">복사</button>
                </div>
                <div class="d-grid gap-2 d-md-block">
                    <a href="https://calendar.google.com/calendar/render?cid=https://raw.githubusercontent.com/Murianwind/weather-calendar/refs/heads/main/weather.ics" target="_blank" class="btn btn-google px-4 py-2">구글 캘린더에 추가</a>
                    <a href="webcal://raw.githubusercontent.com/Murianwind/weather-calendar/refs/heads/main/weather.ics" class="btn btn-apple px-4 py-2">아이폰/맥 추가</a>
                </div>
            </div>

            <div class="card p-4">
                <h4 class="mb-3">👀 3. 오늘 날씨 미리보기</h4>
                <div id="preview">
                    <p class="text-center text-muted">데이터를 불러오는 중...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function copyUrl() {
        const copyText = document.getElementById("urlInput");
        copyText.select();
        document.execCommand("copy");
        alert("구독 URL이 복사되었습니다!");
    }

    // 간단한 미리보기 기능 (파일 내용을 긁어와서 보여줌)
    async function loadPreview() {
        try {
            const response = await fetch('weather.ics');
            const text = await response.text();
            const previewDiv = document.getElementById('preview');
            
            // 데이터 파싱 (간이 방식)
            const summary = text.match(/SUMMARY:(.*)/)[1];
            const description = text.match(/DESCRIPTION:📍 (.*?)Last update/s)[0];
            
            previewDiv.innerHTML = `
                <div class="text-center mb-3">
                    <h2 class="display-6">${summary}</h2>
                    <p class="text-muted">봉화산로 193 상세 예보</p>
                </div>
                <div style="white-space: pre-wrap; font-size: 0.9rem; line-height: 1.6;">
                    ${description.replace(/\\n/g, '\n').replace(/\\,/g, ',')}
                </div>
            `;
        } catch (e) {
            document.getElementById('preview').innerHTML = "데이터를 불러올 수 없습니다. 파일이 생성될 때까지 기다려주세요.";
        }
    }
    loadPreview();
</script>
</body>
</html>
