<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기상청 10일 날씨 달력 제작 풀 가이드</title>
    <style>
        :root { --primary: #2563eb; --accent: #f97316; --success: #059669; --bg: #f8fafc; }
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #334155; max-width: 850px; margin: 0 auto; padding: 20px; background: var(--bg); }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 6px solid var(--primary); }
        .repo-link { background: #e0e7ff; padding: 10px 15px; border-radius: 8px; font-weight: bold; color: #3730a3; display: inline-block; margin-bottom: 20px; text-decoration: none; }
        h1 { text-align: center; color: #1e293b; margin-bottom: 10px; font-size: 2em; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 40px; }
        h2 { color: var(--primary); margin-top: 0; display: flex; align-items: center; font-size: 1.5em; }
        .step-num { background: var(--primary); color: white; width: 32px; height: 32px; text-align: center; border-radius: 50%; font-size: 18px; margin-right: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-weight: bold; }
        .sub-step { background: #f1f5f9; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #cbd5e1; }
        code { background: #fee2e2; padding: 3px 6px; border-radius: 4px; color: #991b1b; font-family: monospace; font-weight: bold; }
        input#address { width: 100%; padding: 18px; margin: 15px 0; border: 2px solid #bfdbfe; border-radius: 10px; box-sizing: border-box; font-size: 18px; }
        .btn-calc { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .btn-calc:hover { background: #1d4ed8; }
        div#result { display:none; margin-top: 25px; padding: 25px; background: #eff6ff; border-radius: 12px; border: 1px solid #bfdbfe; font-size: 1.1em; }
        .example-img { width: 100%; height: auto; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 20px; }
    </style>
</head>
<body>

    <h1>☀️ 기상청 날씨 달력 자동화 제작 가이드</h1>
    <p class="subtitle">원본 저장소: <a href="https://github.com/Murianwind/weather-calendar" target="_blank" class="repo-link">github.com/Murianwind/weather-calendar</a></p>

    <div class="card">
        <h2><span class="step-num">5</span> 내 동네 설정값 찾기</h2>
        <p>주소를 입력하면 전국의 기상청 좌표와 구역코드를 자동으로 찾아드립니다.</p>
        <input type="text" id="address" placeholder="예: 서울특별시 중랑구 신내동 또는 제주 이호일동">
        <button class="btn-calc" onclick="findCoords()">좌표 및 구역코드 계산</button>
        
        <div id="result">
            <p>👇 <b>다음 단계(update_calendar.py)에서 입력할 값들입니다:</b></p>
            <ul>
                <li><b>NX:</b> <code id="res_nx">-</code> / <b>NY:</b> <code id="res_ny">-</code></li>
                <li><b>REG_ID_LAND (육상):</b> <code id="res_land">-</code></li>
                <li><b>REG_ID_TEMP (기온):</b> <code id="res_temp">-</code></li>
            </ul>
            <p style="font-size: 0.85em; color: #64748b; margin-top: 10px;">* 중기 예보 코드는 입력하신 주소와 가장 가까운 거점 지점으로 자동 매칭되었습니다.</p>
        </div>
    </div>

    <script>
        // 기상청 격자 변환 상수 및 함수
        const RE = 6371.00877; const GRID = 5.0; const SLAT1 = 30.0; const SLAT2 = 60.0;
        const OLON = 126.0; const OLAT = 38.0; const XO = 43; const YO = 136;

        function getGrid(lat, lon) {
            const DEGRAD = Math.PI / 180.0;
            const re = RE / GRID; const slat1 = SLAT1 * DEGRAD; const slat2 = SLAT2 * DEGRAD;
            const olon = OLON * DEGRAD; const olat = OLAT * DEGRAD;
            let sn = Math.tan(Math.PI * 0.25 + slat2 * 0.5) / Math.tan(Math.PI * 0.25 + slat1 * 0.5);
            sn = Math.log(Math.cos(slat1) / Math.cos(slat2)) / Math.log(sn);
            let sf = Math.pow(Math.tan(Math.PI * 0.25 + slat1 * 0.5), sn) * Math.cos(slat1) / sn;
            let ro = re * sf / Math.pow(Math.tan(Math.PI * 0.25 + olat * 0.5), sn);
            let ra = re * sf / Math.pow(Math.tan(Math.PI * 0.25 + lat * DEGRAD * 0.5), sn);
            let theta = lon * DEGRAD - olon;
            if (theta > Math.PI) theta -= 2.0 * Math.PI; if (theta < -Math.PI) theta += 2.0 * Math.PI;
            theta *= sn;
            return { x: Math.floor(ra * Math.sin(theta) + XO + 0.5), y: Math.floor(ro - ra * Math.cos(theta) + YO + 0.5) };
        }

        async function findCoords() {
            const addrInput = document.getElementById('address').value;
            if (!addrInput) return alert("주소를 입력해주세요!");

            try {
                // 1. 위경도 검색 (OpenStreetMap API)
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addrInput)}`);
                const geoData = await geoRes.json();
                if (geoData.length === 0) return alert("주소를 찾을 수 없습니다. 상세 주소를 입력해주세요.");
                
                const lat = parseFloat(geoData[0].lat);
                const lon = parseFloat(geoData[0].lon);
                const grid = getGrid(lat, lon);

                // 2. 240개 지역 코드 데이터 로드 (외부 파일)
                const codeRes = await fetch('./region_codes.json');
                const codeData = await codeRes.json();

                // 3. 지능형 매칭 (A타입 육상과 C타입 기온 분리 매칭)
                let matchedLand = "11B00000"; // 기본값 (서울.인천.경기)
                let matchedTemp = "11B10101"; // 기본값 (서울)
                
                // 육상(A) 매칭: 주소에 포함된 광역 키워드 찾기
                for (const item of codeData) {
                    if (item.type === 'A') {
                        // "서울.인천.경기" 같은 경우 마침표로 나누어 대조
                        const names = item.name.split('.');
                        if (names.some(n => addrInput.includes(n.trim())) || addrInput.includes(item.name)) {
                            matchedLand = item.id;
                        }
                    }
                }
                
                // 기온(C) 매칭: 가장 긴 일치 단어 기준 (정확도 향상)
                let bestScore = 0;
                for (const item of codeData) {
                    if (item.type === 'C' && addrInput.includes(item.name)) {
                        if (item.name.length > bestScore) {
                            matchedTemp = item.id;
                            bestScore = item.name.length;
                        }
                    }
                }

                // 4. 결과 출력
                document.getElementById('res_nx').innerText = grid.x;
                document.getElementById('res_ny').innerText = grid.y;
                document.getElementById('res_land').innerText = matchedLand;
                document.getElementById('res_temp').innerText = matchedTemp;
                document.getElementById('result').style.display = 'block';

            } catch (e) {
                alert("데이터 로드 오류! region_codes.json 파일이 저장소에 있는지 확인해주세요.");
            }
        }
    </script>
</body>
</html>
