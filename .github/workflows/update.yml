name: Update Weather ICS

on:
#  schedule:
#    - cron: '15 17,20,23,2,5,8,11,14 * * *'
  repository_dispatch:
    types: [update-weather-ics]  
  
  push:
    paths:
      - 'update_calendar.py'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # 🌟 여기에 위치시켜 보겠습니다.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pytz icalendar

      - name: Log runner IP
        continue-on-error: true
        run: |
          echo "Runner outbound IP:"
          curl -s --max-time 10 ifconfig.me || echo "(IP 조회 실패)"
          echo ""

      - name: Run update script
        id: run_script
        continue-on-error: true
        timeout-minutes: 10
        env:
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
          KMA_NX: ${{ secrets.KMA_NX }}
          KMA_NY: ${{ secrets.KMA_NY }}
          LOCATION_NAME: ${{ secrets.LOCATION_NAME }}
          REG_ID_TEMP: ${{ secrets.REG_ID_TEMP }}
          REG_ID_LAND: ${{ secrets.REG_ID_LAND }}
          TZ: Asia/Seoul
        run: python -u update_calendar.py

      - name: Commit and Push changes
        if: always()
        run: |
          KST_TIME=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S')
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add weather.ics
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update weather.ics [$KST_TIME KST]"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Fail job if API fallback occurred
        if: always() && steps.run_script.outcome == 'failure'
        run: |
          echo "::error::단기 또는 중기 예보 API 호출이 실패해서 캐시 데이터로 대체됐습니다. 이 워크플로우 실행은 실패로 표시됩니다."
          exit 1
